<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mis Gastos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0e0e12;--surface:#16161c;--surface2:#1e1e27;--border:#2a2a36;
    --accent:#7c5cfc;--accent2:#fc5c7d;--green:#4ade80;--yellow:#fbbf24;
    --red:#f87171;--text:#f0f0f5;--muted:#6b6b80;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;justify-content:center;}
  .app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;position:relative;}
  .screen{display:none;flex-direction:column;flex:1;animation:fadeUp .3s ease;}
  .screen.active{display:flex;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* TOPBAR */
  .topbar{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;}
  .topbar h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;}
  .topbar span.acc{color:var(--accent);}
  .sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:99px;cursor:pointer;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .sync-dot.syncing{background:var(--yellow);animation:pulse .8s infinite;}
  .sync-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* PERIOD SELECTOR */
  .period-bar{padding:12px 20px 0;display:flex;flex-direction:column;gap:8px;}
  .period-row{display:flex;gap:8px;align-items:center;}
  .period-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;min-width:44px;}
  .period-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1;}
  .period-chips::-webkit-scrollbar{display:none;}
  .pchip{flex-shrink:0;padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);font-size:12px;font-weight:500;background:var(--surface);cursor:pointer;color:var(--muted);transition:all .2s;white-space:nowrap;}
  .pchip.active{background:var(--accent);border-color:var(--accent);color:white;}
  .pchip.week-chip{font-size:11px;padding:5px 10px;}

  /* OFFLINE */
  .offline-banner{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:8px 16px;margin:8px 20px 0;font-size:12px;color:var(--red);display:none;align-items:center;gap:8px;}
  .offline-banner.show{display:flex;}

  /* BUDGET CARDS */
  .budget-section{padding:12px 20px;display:flex;flex-direction:column;gap:10px;}
  .budget-card{border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;}
  .budget-card.purple{background:linear-gradient(135deg,#1a1030 0%,#0e1a30 100%);}
  .budget-card.purple::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(124,92,252,.22) 0%,transparent 70%);pointer-events:none;}
  .budget-card.teal{background:linear-gradient(135deg,#0d1f1a 0%,#0a1510 100%);}
  .budget-card.teal::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(74,222,128,.15) 0%,transparent 70%);pointer-events:none;}
  .budget-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  .budget-amounts{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;}
  .budget-spent{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;}
  .budget-total-lbl{font-size:13px;color:var(--muted);}
  .progress-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:99px;transition:width .5s ease;}
  .budget-remaining{font-size:11px;margin-top:7px;display:flex;justify-content:space-between;}
  .budget-remaining-label{color:var(--muted);}
  .budget-remaining-value{font-weight:600;}

  /* MINI ROW */
  .budget-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .budget-mini{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;position:relative;}
  .budget-mini-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
  .budget-mini-amount{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
  .budget-mini-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .sdot{width:6px;height:6px;border-radius:50%;position:absolute;top:10px;right:10px;}

  /* MONTH TOTAL */
  .month-total{background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(252,92,125,.1));border:1px solid rgba(124,92,252,.3);border-radius:14px;padding:16px;margin-bottom:0;display:flex;justify-content:space-between;align-items:center;}
  .month-total-label{font-size:12px;color:var(--muted);margin-bottom:2px;}
  .month-total-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
  .cashback-pill{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);border-radius:10px;padding:8px 14px;text-align:center;flex-shrink:0;}
  .cashback-label{font-size:10px;color:var(--muted);}
  .cashback-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--green);}

  /* LOANS */
  .loans-card{background:linear-gradient(135deg,#1a1220 0%,#0e1020 100%);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;}
  .loans-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(245,158,11,.15) 0%,transparent 70%);pointer-events:none;}
  .loans-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .loans-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .loans-count{font-size:10px;color:#f59e0b;background:rgba(245,158,11,.15);padding:3px 8px;border-radius:99px;}
  .loans-total{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#f59e0b;margin-bottom:8px;}
  .loans-breakdown{display:flex;gap:12px;}
  .loans-item{flex:1;}
  .loans-item-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
  .loans-item-value{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
  .loans-divider{width:1px;background:var(--border);}

  /* TRANSACTIONS */
  .section-header{display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin-bottom:10px;}
  .section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
  .see-all{font-size:12px;color:var(--accent);cursor:pointer;}
  .transactions-list{padding:0 20px;display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;padding-bottom:100px;}
  .tx-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
  .tx-item:active{transform:scale(.98);border-color:var(--accent);}
  .tx-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .tx-info{flex:1;min-width:0;}
  .tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center;}
  .tx-cat-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;}
  .tx-right{text-align:right;flex-shrink:0;}
  .tx-amount{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
  .tx-status{font-size:10px;margin-top:3px;padding:2px 7px;border-radius:99px;display:inline-block;}
  .status-paid{background:rgba(74,222,128,.15);color:var(--green);}
  .status-pending{background:rgba(251,191,36,.15);color:var(--yellow);}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,14,18,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:100;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;}
  .nav-icon{font-size:20px;line-height:1;}
  .nav-label{font-size:10px;color:var(--muted);transition:color .2s;}
  .nav-item.active .nav-label{color:var(--accent);}
  .fab{position:relative;flex:0 0 60px;}
  .fab-btn{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:54px;height:54px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(124,92,252,.5);transition:all .2s;}
  .fab-btn:active{transform:translateX(-50%) scale(.92);}

  /* FORM */
  .form-screen{padding:20px;flex:1;overflow-y:auto;padding-bottom:120px;}
  .form-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:24px;}
  .form-group{margin-bottom:16px;}
  .form-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:block;}
  input,select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
  input:focus,select:focus{border-color:var(--accent);}
  input[type="date"]{color:var(--text);}
  .amount-input-wrapper{position:relative;}
  .currency-prefix{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--muted);pointer-events:none;}
  .amount-input-wrapper input{padding-left:32px;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .cat-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s;}
  .cat-btn.selected{border-color:var(--accent);background:rgba(124,92,252,.12);}
  .cat-btn:active{transform:scale(.94);}
  .cat-btn-icon{font-size:20px;}
  .cat-btn-label{font-size:10px;color:var(--muted);text-align:center;}
  .cat-btn.selected .cat-btn-label{color:var(--accent);}
  .status-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .status-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s;}
  .status-btn.sel-paid{border-color:var(--green);background:rgba(74,222,128,.1);}
  .status-btn.sel-pend{border-color:var(--yellow);background:rgba(251,191,36,.1);}
  .status-btn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:white;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;}
  .submit-btn:active{transform:scale(.98);opacity:.9;}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;}
  .delete-btn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px;cursor:pointer;margin-top:10px;width:100%;font-family:'DM Sans',sans-serif;}

  /* LIST SCREEN */
  .filter-bar{display:flex;gap:8px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .filter-chip{flex-shrink:0;padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);font-size:12px;font-weight:500;background:var(--surface);cursor:pointer;color:var(--muted);}
  .filter-chip.active{background:var(--accent);border-color:var(--accent);color:white;}
  .search-wrap{padding:0 20px 12px;position:relative;}
  .search-wrap::before{content:'🔍';position:absolute;left:32px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;z-index:1;}
  .search-wrap input{padding-left:40px;}

  /* STATS */
  .stats-section{padding:0 20px;flex:1;overflow-y:auto;padding-bottom:100px;}
  .stats-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .stats-card-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
  .cat-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .cat-stat-icon{font-size:16px;width:24px;text-align:center;}
  .cat-stat-name{font-size:13px;flex:1;}
  .cat-stat-bar-wrap{flex:2;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
  .cat-stat-bar{height:100%;border-radius:99px;}
  .cat-stat-amount{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;min-width:80px;text-align:right;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .stat-mini{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;}
  .stat-mini-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
  .stat-mini-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}

  /* MISC */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading-overlay{position:fixed;inset:0;background:rgba(14,14,18,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:16px;}
  .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:14px;color:var(--muted);}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-state-icon{font-size:40px;margin-bottom:12px;}
  .empty-state-text{font-size:14px;line-height:1.5;}
  select option{background:#1e1e27;}
  .back-btn{font-size:20px;cursor:pointer;padding:4px;}
  .icon-btn{width:38px;height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .period-context{font-size:11px;color:var(--muted);padding:2px 20px 0;margin-bottom:-4px;}
</style>
</head>
<body>
<div class="app">

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Conectando con Google Sheets...</div>
</div>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="topbar">
    <h1>Mis <span class="acc">Gastos</span></h1>
    <div class="sync-indicator" id="sync-indicator" onclick="syncFromSheets(true)">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Sync</span>
    </div>
  </div>
  <div class="offline-banner" id="offline-banner">⚠️ Sin conexión — datos locales</div>
  <div class="period-bar" id="period-bar-home"></div>
  <div class="period-context" id="period-ctx-home"></div>
  <div class="budget-section" id="budgets"></div>
  <div class="section-header">
    <span class="section-title" id="recent-title">Recientes</span>
    <span class="see-all" onclick="go('s-list');renderList()">Ver todos →</span>
  </div>
  <div class="transactions-list" id="recent-list"></div>
</div>

<!-- ADD/EDIT -->
<div class="screen" id="s-add">
  <div class="topbar"><span class="back-btn" onclick="go('s-home')">←</span><div></div></div>
  <div class="form-screen">
    <div class="form-title" id="form-title">Nueva transacción</div>
    <div class="form-group">
      <label class="form-label">Tienda / Descripción</label>
      <input type="text" id="f-store" placeholder="Ej: Carulla, Uber, Netflix...">
    </div>
    <div class="form-group">
      <label class="form-label">Monto (COP)</label>
      <div class="amount-input-wrapper">
        <span class="currency-prefix">$</span>
        <input type="number" id="f-amount" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input type="date" id="f-date">
    </div>
    <div class="form-group">
      <label class="form-label">Categoría</label>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Estado</label>
      <div class="status-row">
        <div class="status-btn sel-paid" id="btn-paid" onclick="selStatus('Pagado')">
          <div class="status-btn-dot" style="background:var(--green)"></div><span>Pagado</span>
        </div>
        <div class="status-btn" id="btn-pend" onclick="selStatus('Pendiente')">
          <div class="status-btn-dot" style="background:var(--yellow)"></div><span>Pendiente</span>
        </div>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="saveTx()">✦ Registrar gasto</button>
    <button class="delete-btn" id="del-btn" style="display:none" onclick="deleteTx()">🗑 Eliminar transacción</button>
  </div>
</div>

<!-- LIST -->
<div class="screen" id="s-list">
  <div class="topbar" style="margin-bottom:12px">
    <span class="back-btn" onclick="go('s-home')">←</span>
    <h1 style="font-size:18px">Transacciones</h1>
    <div class="icon-btn" onclick="syncFromSheets(true)">🔄</div>
  </div>
  <div class="period-bar" id="period-bar-list" style="padding:0 20px 8px"></div>
  <div class="search-wrap"><input type="text" id="search" placeholder="   Buscar..." oninput="renderList()"></div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="transactions-list" id="full-list"></div>
</div>

<!-- STATS -->
<div class="screen" id="s-stats">
  <div class="topbar" style="margin-bottom:12px">
    <span class="back-btn" onclick="go('s-home')">←</span>
    <h1 style="font-size:18px">Estadísticas</h1>
    <div style="width:38px"></div>
  </div>
  <div class="period-bar" id="period-bar-stats" style="padding:0 20px 8px"></div>
  <div class="stats-section" id="stats-section"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="n-home" onclick="go('s-home');nav('n-home')">
    <div class="nav-icon">🏠</div><div class="nav-label">Inicio</div>
  </div>
  <div class="nav-item" id="n-list" onclick="go('s-list');renderList();nav('n-list')">
    <div class="nav-icon">📋</div><div class="nav-label">Gastos</div>
  </div>
  <div class="fab"><div class="fab-btn" onclick="openAdd()">＋</div></div>
  <div class="nav-item" id="n-stats" onclick="go('s-stats');renderStats();nav('n-stats')">
    <div class="nav-icon">📊</div><div class="nav-label">Stats</div>
  </div>
  <div class="nav-item" id="n-refresh" onclick="syncFromSheets(true);nav('n-refresh')">
    <div class="nav-icon">🔄</div><div class="nav-label">Sync</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxdnFCP2Owqd6lXOTPG91rg1Xjb9qRj63PS2dbbUf4VIWS5mfOoVIHalJrRbYk9u1h4/exec';

const CATS = [
  {id:'comida',         label:'Comida',      icon:'🍔', color:'#f97316'},
  {id:'transporte',     label:'Transporte',  icon:'🚗', color:'#3b82f6'},
  {id:'mercado',        label:'Mercado',     icon:'🛒', color:'#10b981'},
  {id:'regalos',        label:'Regalos',     icon:'🎁', color:'#ec4899'},
  {id:'casa',           label:'Casa',        icon:'🏠', color:'#8b5cf6'},
  {id:'entretenimiento',label:'Entret.',     icon:'🎮', color:'#06b6d4'},
  {id:'prestamos',      label:'Préstamos',   icon:'💸', color:'#f59e0b'},
  {id:'otro',           label:'Otro',        icon:'📦', color:'#6b7280'},
];
const CAT_LABEL_MAP = {};
CATS.forEach(c => { CAT_LABEL_MAP[c.label]=c.id; CAT_LABEL_MAP[c.id]=c.id; });

// Budget constants
const BUDGET_MERCADO_MES  = 1000000;
const BUDGET_GENERAL_MES  = 2400000; // excl. mercado
const BUDGET_GENERAL_SEM  = 600000;  // 2.4M / 4 semanas fijas

// Week blocks: day 1-7 = S1, 8-14 = S2, 15-21 = S3, 22-end = S4
function weekNumForDay(day) {
  if (day <= 7)  return 1;
  if (day <= 14) return 2;
  if (day <= 21) return 3;
  return 4;
}
function weekRangeLabel(monthStr, wk) {
  const [y,m] = monthStr.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const starts = [1,8,15,22];
  const ends   = [7,14,21,lastDay];
  return `${starts[wk-1]}–${ends[wk-1]}`;
}
function dateInWeek(dateStr, monthStr, wk) {
  if (!dateStr || !dateStr.startsWith(monthStr)) return false;
  const day = parseInt(dateStr.split('-')[2]);
  return weekNumForDay(day) === wk;
}

// Period state: { month: 'YYYY-MM', week: 1|2|3|4|null }
const now = new Date();
let period = {
  month: now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'),
  week: weekNumForDay(now.getDate())
};

// Available months: current + 5 previous
function availableMonths() {
  const months = [];
  const d = new Date();
  for (let i = 0; i < 6; i++) {
    const y = d.getFullYear(), m = d.getMonth() - i;
    const dt = new Date(y, m, 1);
    const str = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    const label = dt.toLocaleString('es-CO',{month:'short',year:'2-digit'}).replace('.',' \'');
    months.push({str, label});
  }
  return months;
}

function periodLabel() {
  const [y,m] = period.month.split('-').map(Number);
  const mName = new Date(y,m-1,1).toLocaleString('es-CO',{month:'long',year:'numeric'});
  if (period.week) {
    const range = weekRangeLabel(period.month, period.week);
    return `${mName} · Semana ${period.week} (días ${range})`;
  }
  return mName;
}

// Filter txns by current period
function filteredTxns(all) {
  return all.filter(t => {
    if (!t.date) return false;
    if (period.week) return dateInWeek(t.date, period.month, period.week);
    return t.date.startsWith(period.month);
  });
}

// ── DATA ──
let txns = JSON.parse(localStorage.getItem('txns')||'[]');
let selCat='comida', selSt='Pagado', editId=null, activeF='Todos';
let isSyncing=false;

function saveLocal(){localStorage.setItem('txns',JSON.stringify(txns));}
function fmt(n){return '$'+Math.round(n).toLocaleString('es-CO');}
function today(){return new Date().toISOString().split('T')[0];}
function cat(id){return CATS.find(c=>c.id===id)||CATS[7];}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function setSyncState(state){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  const banner=document.getElementById('offline-banner');
  if(state==='ok'){dot.className='sync-dot';lbl.textContent='Sync';banner.classList.remove('show');}
  else if(state==='syncing'){dot.className='sync-dot syncing';lbl.textContent='...';}
  else if(state==='error'){dot.className='sync-dot error';lbl.textContent='Offline';banner.classList.add('show');}
}

// ── SCREENS ──
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-home') renderHome();
  if(id==='s-stats') renderStats();
}
function nav(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById(id);if(el)el.classList.add('active');
}

// ── PERIOD BAR ──
function renderPeriodBars() {
  const months = availableMonths();
  const monthHTML = months.map(mo =>
    `<div class="pchip${mo.str===period.month?' active':''}" onclick="setMonth('${mo.str}')">${mo.label}</div>`
  ).join('');
  const weekHTML = [1,2,3,4].map(w => {
    const range = weekRangeLabel(period.month, w);
    return `<div class="pchip week-chip${period.week===w?' active':''}" onclick="setWeek(${w})">S${w} <span style="opacity:.6;font-size:10px">${range}</span></div>`;
  }).join('');
  const allWeekChip = `<div class="pchip week-chip${period.week===null?' active':''}" onclick="setWeek(null)">Todo el mes</div>`;

  const html = `
    <div class="period-row">
      <span class="period-label">Mes</span>
      <div class="period-chips">${monthHTML}</div>
    </div>
    <div class="period-row">
      <span class="period-label">Semana</span>
      <div class="period-chips">${allWeekChip}${weekHTML}</div>
    </div>`;

  ['period-bar-home','period-bar-list','period-bar-stats'].forEach(id => {
    const el=document.getElementById(id); if(el) el.innerHTML=html;
  });

  const ctx = document.getElementById('period-ctx-home');
  if(ctx) ctx.textContent = periodLabel();
}

function setMonth(m) {
  period.month = m;
  // Keep same week number if valid for new month, otherwise stay
  renderPeriodBars();
  renderHome();
  renderList();
  renderStats();
}
function setWeek(w) {
  period.week = w;
  renderPeriodBars();
  renderHome();
  renderList();
  renderStats();
}

// ── SHEETS API ──
async function sheetsGet(){
  const res=await fetch(SCRIPT_URL,{method:'GET',mode:'cors'});
  return res.json();
}
async function sheetsPost(payload){
  const res=await fetch(SCRIPT_URL,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  return res.json();
}
function mapFromSheets(r){
  return {
    id:String(r.id),
    date:r.date?String(r.date).substring(0,10):today(),
    store:r.store||'',
    cat:CAT_LABEL_MAP[r.category]||'otro',
    amount:Number(r.amount)||0,
    status:r.status||'Pagado'
  };
}
async function syncFromSheets(manual=false){
  if(isSyncing)return;
  isSyncing=true; setSyncState('syncing');
  if(manual)toast('🔄 Sincronizando...');
  try{
    const rows=await sheetsGet();
    if(Array.isArray(rows)){
      txns=rows.map(mapFromSheets).filter(t=>t.id&&t.store);
      saveLocal();
    }
    setSyncState('ok');
    if(manual)toast('✅ Datos actualizados');
    renderHome(); renderList(); renderStats();
  }catch(e){
    setSyncState('error');
    if(manual)toast('⚠️ Sin conexión — datos locales');
  }finally{
    isSyncing=false;
    document.getElementById('loading').style.display='none';
  }
}
async function pushToSheets(action,payload){
  try{
    setSyncState('syncing');
    await sheetsPost({action,...payload});
    setSyncState('ok'); return true;
  }catch(e){
    setSyncState('error'); return false;
  }
}

// ── HOME ──
function renderHome(){
  const slice = filteredTxns(txns);
  const isWeekView = period.week !== null;

  // All loans (always global, not filtered by period)
  const loansAll  = txns.filter(t=>t.cat==='prestamos');
  const loansPaid = loansAll.filter(t=>t.status==='Pagado').reduce((a,t)=>a+t.amount,0);
  const loansPend = loansAll.filter(t=>t.status==='Pendiente').reduce((a,t)=>a+t.amount,0);
  const loansTotal = loansPaid + loansPend;

  // Totals from filtered slice
  const total   = slice.reduce((a,t)=>a+t.amount,0);
  const mercado = slice.filter(t=>t.cat==='mercado').reduce((a,t)=>a+t.amount,0);
  const general = slice.filter(t=>t.cat!=='mercado').reduce((a,t)=>a+t.amount,0); // excl mercado
  const pend    = txns.filter(t=>t.status==='Pendiente');

  // Budget refs depending on week vs month view
  const budgetGeneral = isWeekView ? BUDGET_GENERAL_SEM : BUDGET_GENERAL_MES;
  const budgetMercado = isWeekView ? Math.round(BUDGET_MERCADO_MES/4) : BUDGET_MERCADO_MES;
  const generalLabel  = isWeekView
    ? `📅 Gastos semana ${period.week} (días ${weekRangeLabel(period.month, period.week)})`
    : '📅 Gastos generales — mes completo';
  const mercadoLabel  = isWeekView
    ? `🛒 Mercado semana ${period.week}`
    : '🛒 Mercado — mes completo';

  const pG = Math.min(100, general/budgetGeneral*100);
  const pM = Math.min(100, mercado/budgetMercado*100);
  const cG = pG>85?'var(--red)':pG>65?'var(--yellow)':'var(--green)';
  const cM = pM>85?'var(--red)':pM>65?'var(--yellow)':'var(--accent)';
  const remG = Math.max(0, budgetGeneral - general);
  const remM = Math.max(0, budgetMercado - mercado);

  document.getElementById('recent-title').textContent =
    isWeekView ? `Transacciones · Semana ${period.week}` : 'Recientes';

  document.getElementById('budgets').innerHTML = `
    <div class="month-total">
      <div><div class="month-total-label">Total${isWeekView?` semana ${period.week}`:' del mes'}</div><div class="month-total-value">${fmt(total)}</div></div>
      <div class="cashback-pill"><div class="cashback-label">Cashback 1%</div><div class="cashback-value">${fmt(total*0.01)}</div></div>
    </div>

    <div class="budget-card teal">
      <div class="budget-label">${generalLabel}</div>
      <div class="budget-amounts">
        <span class="budget-spent" style="color:${cG}">${fmt(general)}</span>
        <span class="budget-total-lbl">/ ${fmt(budgetGeneral)}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pG}%;background:${cG}"></div></div>
      <div class="budget-remaining">
        <span class="budget-remaining-label">Disponible</span>
        <span class="budget-remaining-value" style="color:${cG}">${fmt(remG)}</span>
      </div>
    </div>

    <div class="budget-card purple">
      <div class="budget-label">${mercadoLabel}</div>
      <div class="budget-amounts">
        <span class="budget-spent" style="color:${cM}">${fmt(mercado)}</span>
        <span class="budget-total-lbl">/ ${fmt(budgetMercado)}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pM}%;background:${cM}"></div></div>
      <div class="budget-remaining">
        <span class="budget-remaining-label">Disponible</span>
        <span class="budget-remaining-value" style="color:${cM}">${fmt(remM)}</span>
      </div>
    </div>

    <div class="loans-card">
      <div class="loans-header">
        <div class="loans-title">💸 Préstamos (total acumulado)</div>
        <div class="loans-count">${loansAll.length} transac.</div>
      </div>
      <div class="loans-total">${fmt(loansTotal)}</div>
      <div class="loans-breakdown">
        <div class="loans-item">
          <div class="loans-item-label">Pagado</div>
          <div class="loans-item-value" style="color:var(--green)">${fmt(loansPaid)}</div>
        </div>
        <div class="loans-divider"></div>
        <div class="loans-item" style="padding-left:16px">
          <div class="loans-item-label">Pendiente</div>
          <div class="loans-item-value" style="color:var(--yellow)">${fmt(loansPend)}</div>
        </div>
      </div>
    </div>

    <div class="budget-row">
      <div class="budget-mini">
        <div class="sdot" style="background:var(--accent)"></div>
        <div class="budget-mini-label">Transac.</div>
        <div class="budget-mini-amount">${slice.length}</div>
        <div class="budget-mini-sub">${isWeekView?`semana ${period.week}`:'este mes'}</div>
      </div>
      <div class="budget-mini">
        <div class="sdot" style="background:var(--yellow)"></div>
        <div class="budget-mini-label">Por pagar</div>
        <div class="budget-mini-amount" style="color:var(--yellow)">${fmt(pend.reduce((a,t)=>a+t.amount,0))}</div>
        <div class="budget-mini-sub">${pend.length} items</div>
      </div>
      <div class="budget-mini">
        <div class="sdot" style="background:var(--green)"></div>
        <div class="budget-mini-label">Cashback</div>
        <div class="budget-mini-amount" style="color:var(--green)">${fmt(total*0.01)}</div>
        <div class="budget-mini-sub">acumulado</div>
      </div>
    </div>`;

  const recent = [...slice].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const el=document.getElementById('recent-list');
  el.innerHTML = recent.length ? recent.map(txHTML).join('') :
    '<div class="empty-state"><div class="empty-state-icon">💳</div><div class="empty-state-text">Sin transacciones en este período.<br>Toca ＋ para agregar un gasto.</div></div>';
}

function txHTML(t){
  const c=cat(t.cat);
  const sc=t.status==='Pagado'?'status-paid':'status-pending';
  return `<div class="tx-item" onclick="openEdit('${t.id}')">
    <div class="tx-icon" style="background:${c.color}22">${c.icon}</div>
    <div class="tx-info">
      <div class="tx-name">${t.store}</div>
      <div class="tx-meta"><span>${t.date}</span><span class="tx-cat-badge" style="background:${c.color}22;color:${c.color}">${c.label}</span></div>
    </div>
    <div class="tx-right"><div class="tx-amount">${fmt(t.amount)}</div><div class="tx-status ${sc}">${t.status}</div></div>
  </div>`;
}

// ── LIST ──
function renderList(){
  const filters=['Todos',...CATS.map(c=>c.label),'Pendiente'];
  document.getElementById('filter-bar').innerHTML=filters.map(f=>
    `<div class="filter-chip${f===activeF?' active':''}" onclick="setF('${f}')">${f}</div>`).join('');
  const search=(document.getElementById('search')?.value||'').toLowerCase();
  let list=[...filteredTxns(txns)].sort((a,b)=>b.date.localeCompare(a.date));
  if(activeF!=='Todos'){
    if(activeF==='Pendiente') list=list.filter(t=>t.status==='Pendiente');
    else{const c=CATS.find(c=>c.label===activeF);if(c)list=list.filter(t=>t.cat===c.id);}
  }
  if(search)list=list.filter(t=>t.store.toLowerCase().includes(search));
  const el=document.getElementById('full-list');
  el.innerHTML=list.length?list.map(txHTML).join(''):
    '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">Sin resultados en este período.</div></div>';
}
function setF(f){activeF=f;renderList();}

// ── FORM ──
function renderCatGrid(){
  document.getElementById('cat-grid').innerHTML=CATS.map(c=>
    `<div class="cat-btn${c.id===selCat?' selected':''}" onclick="selCat2('${c.id}')">
      <div class="cat-btn-icon">${c.icon}</div><div class="cat-btn-label">${c.label}</div>
    </div>`).join('');
}
function selCat2(id){selCat=id;renderCatGrid();}
function selStatus(s){
  selSt=s;
  document.getElementById('btn-paid').className='status-btn'+(s==='Pagado'?' sel-paid':'');
  document.getElementById('btn-pend').className='status-btn'+(s==='Pendiente'?' sel-pend':'');
}
function openAdd(){
  editId=null;
  document.getElementById('f-store').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-date').value=today();
  selCat='comida';selSt='Pagado';
  renderCatGrid();selStatus('Pagado');
  document.getElementById('form-title').textContent='Nueva transacción';
  document.getElementById('del-btn').style.display='none';
  document.getElementById('submit-btn').textContent='✦ Registrar gasto';
  go('s-add');
}
function openEdit(id){
  const t=txns.find(x=>x.id===id);if(!t)return;
  editId=id;
  document.getElementById('f-store').value=t.store;
  document.getElementById('f-amount').value=t.amount;
  document.getElementById('f-date').value=t.date;
  selCat=t.cat;selSt=t.status;
  renderCatGrid();selStatus(t.status);
  document.getElementById('form-title').textContent='Editar transacción';
  document.getElementById('del-btn').style.display='block';
  document.getElementById('submit-btn').textContent='✦ Guardar cambios';
  go('s-add');
}
async function saveTx(){
  const store=document.getElementById('f-store').value.trim();
  const amount=parseFloat(document.getElementById('f-amount').value);
  const date=document.getElementById('f-date').value;
  if(!store||!amount||!date){toast('⚠️ Completa todos los campos');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Guardando...';
  const c=cat(selCat);
  if(editId){
    const idx=txns.findIndex(t=>t.id===editId);
    if(idx>-1)txns[idx]={...txns[idx],store,amount,date,cat:selCat,status:selSt};
    saveLocal();
    const ok=await pushToSheets('update',{id:editId,store,amount,date,category:c.label,status:selSt});
    toast(ok?'✅ Actualizado en Sheets':'⚠️ Guardado local');
  }else{
    const id=Date.now().toString();
    txns.push({id,store,amount,date,cat:selCat,status:selSt});
    saveLocal();
    const ok=await pushToSheets('add',{id,store,amount,date,category:c.label,status:selSt});
    toast(ok?'✅ Guardado en Sheets':'⚠️ Guardado local');
  }
  btn.disabled=false;
  go('s-home');
}
async function deleteTx(){
  if(!confirm('¿Eliminar esta transacción?'))return;
  txns=txns.filter(t=>t.id!==editId);
  saveLocal();
  const ok=await pushToSheets('delete',{id:editId});
  toast(ok?'🗑 Eliminado de Sheets':'⚠️ Eliminado local');
  go('s-home');
}

// ── STATS ──
function renderStats(){
  const slice=filteredTxns(txns);
  const total=slice.reduce((a,t)=>a+t.amount,0);
  const bycat={};CATS.forEach(c=>{bycat[c.id]=0;});
  slice.forEach(t=>{bycat[t.cat]=(bycat[t.cat]||0)+t.amount;});
  const sorted=CATS.filter(c=>bycat[c.id]>0).sort((a,b)=>bycat[b.id]-bycat[a.id]);
  const max=sorted.length?bycat[sorted[0].id]:1;
  const label=periodLabel();

  document.getElementById('stats-section').innerHTML=`
    <div class="month-total" style="margin-bottom:12px">
      <div><div class="month-total-label">${label}</div><div class="month-total-value">${fmt(total)}</div></div>
      <div class="cashback-pill"><div class="cashback-label">Cashback</div><div class="cashback-value">${fmt(total*0.01)}</div></div>
    </div>
    <div class="stats-card">
      <div class="stats-card-title">Por categoría</div>
      ${sorted.length===0?'<div style="color:var(--muted);font-size:13px;text-align:center;padding:12px">Sin datos en este período</div>':
        sorted.map(c=>`<div class="cat-stat-row">
          <span class="cat-stat-icon">${c.icon}</span>
          <span class="cat-stat-name">${c.label}</span>
          <div class="cat-stat-bar-wrap"><div class="cat-stat-bar" style="width:${bycat[c.id]/max*100}%;background:${c.color}"></div></div>
          <span class="cat-stat-amount" style="color:${c.color}">${fmt(bycat[c.id])}</span>
        </div>`).join('')}
    </div>
    <div class="stats-card">
      <div class="stats-card-title">Resumen</div>
      <div class="stat-grid">
        <div class="stat-mini"><div class="stat-mini-label">Transacciones</div><div class="stat-mini-value">${slice.length}</div></div>
        <div class="stat-mini"><div class="stat-mini-label">Pagadas</div><div class="stat-mini-value" style="color:var(--green)">${slice.filter(t=>t.status==='Pagado').length}</div></div>
        <div class="stat-mini"><div class="stat-mini-label">Pendientes</div><div class="stat-mini-value" style="color:var(--yellow)">${slice.filter(t=>t.status==='Pendiente').length}</div></div>
        <div class="stat-mini"><div class="stat-mini-label">Promedio</div><div class="stat-mini-value">${fmt(total/(slice.length||1))}</div></div>
      </div>
    </div>`;
}

// ── INIT ──
renderCatGrid();
document.getElementById('f-date').value=today();
renderPeriodBars();
renderHome();
syncFromSheets(false);
setInterval(()=>syncFromSheets(false),5*60*1000);
</script>
